include:
  - ./compose/databases.yml
  - ./compose/messaging.yml
  - ./compose/infrastructure.yml
  - ./compose/init.yml
  - ./compose/services.yml

networks:
  speaking-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
    driver: local
  kafka_data:
    driver: local
  minio_data:
    driver: local
