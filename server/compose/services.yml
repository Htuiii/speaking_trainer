services:
  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    container_name: speaking_gateway
    hostname: gateway
    networks:
      - speaking-network
    ports:
      - "${PORT:-4000}:8000"
    environment:
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:3000}
      QUESTIONS_SERVICE_URL: "http://questions-service:8000"
    depends_on:
      questions-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
  questions-service:
    build:
      context: ..
      dockerfile: services/questions-service/Dockerfile
    container_name: speaking_questions-service
    hostname: questions-service
    networks:
      - speaking-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
